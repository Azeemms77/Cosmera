<!DOCTYPE html>
<html>

<head>
    <title>Identify Object</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            background: radial-gradient(circle at top, #0b0f2a, #020412);
            text-align: center;
            min-height: 100vh;
        }

        /* FLOATING NAVIGATION BAR */
        nav {
            position: fixed;
            top: 20px;
            right: 40px;
            display: flex;
            align-items: center;
            height: 50px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
        }

        nav a {
            color: #9fd3ff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        nav a:hover {
            color: white;
            opacity: 1;
            text-shadow: 0 0 15px rgba(159, 211, 255, 0.6);
        }

        /* TOP LEFT LOGO */
        .top-left-logo {
            position: fixed;
            top: 20px;
            left: 40px;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .top-left-logo img {
            height: 80px;
            filter: drop-shadow(0 0 15px rgba(106, 124, 255, 0.8));
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #9fd3ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .top-left-logo:hover {
            transform: scale(1.05);
        }

        /* LOGO SECTION */
        .page-header {
            padding-top: 100px;
            margin-bottom: 20px;
        }

        .page-header img {
            height: 150px;
            /* Slightly smaller than hero for subpages */
            filter: drop-shadow(0 0 15px rgba(120, 150, 255, 0.7));
        }

        .upload {
            margin-top: 40px;
            border: 2px dashed #6a7cff;
            display: inline-block;
            padding: 50px;
            border-radius: 30px;
            background: rgba(106, 124, 255, 0.05);
            transition: 0.3s;
        }

        .upload:hover {
            background: rgba(106, 124, 255, 0.1);
            border-color: #ffffff;
        }

        button {
            margin-top: 25px;
            padding: 12px 35px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6a7cff, #4a5eff);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(106, 124, 255, 0.3);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(106, 124, 255, 0.4);
        }

        #result {
            margin-top: 40px;
            font-size: 26px;
            color: #9fd3ff;
            font-weight: bold;
        }

        #note {
            margin-top: 20px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <a href="index.html" class="top-left-logo">
        <img src="cosmera-logo.png" alt="Lumina Logo" onload="this.nextElementSibling.style.display='none'"
            onerror="this.style.display='none'">
        <span class="logo-text">Lumina</span>
    </a>

    <nav>
        <a href="index.html">Home</a>
        <a href="learn.html">Learn</a>
        <a href="identify.html">Identify</a>
    </nav>

    <div style="padding-top: 150px;"></div>

    <h1>Identify Cosmic Object</h1>
    <p>Powered by Lumina AI</p>

    <div class="upload">
        <input type="file" id="imageInput"><br>
        <button onclick="sendImage()">Identify Object</button>
    </div>

    <div id="result"></div>
    <div id="note">Lumina can sometimes make mistakes.</div>

    <script>
        async function sendImage() {
            const fileInput = document.getElementById("imageInput");
            const result = document.getElementById("result");

            if (!fileInput.files.length) {
                result.innerText = "Please select an image";
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            result.innerText = "Lumina is analyzing...";

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("Server error");

                const data = await response.json();
                result.innerText = `Lumina identifies this as: ${data.prediction} (Confidence: ${Math.round(data.confidence * 100)}%)`;
            } catch (err) {
                result.innerText = "⚠ Identification failed. Check connection.";
            }
        }
    </script>

</body>

</html>
